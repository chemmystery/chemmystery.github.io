<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chem-Mystery · Student Resources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f4f1ec;
      --surface:   rgba(255,255,255,0.62);
      --border:    rgba(255,255,255,0.85);
      --shadow:    rgba(160,140,110,0.18);
      --text:      #2a2318;
      --text-muted:#7a6e5f;
      --accent1:   #5e7ce2;
      --accent2:   #9b59b6;
      --accent3:   #2ecc9e;
      --font-serif:'Cormorant Garamond', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* BACKGROUND */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.38; }
    .blob-1 { width:520px;height:520px;background:radial-gradient(circle,#b8caf8,transparent 70%);top:-120px;left:-100px; }
    .blob-2 { width:420px;height:420px;background:radial-gradient(circle,#d5b8f8,transparent 70%);top:30%;right:-80px; }
    .blob-3 { width:360px;height:360px;background:radial-gradient(circle,#a8f0dd,transparent 70%);bottom:5%;left:20%; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(94,124,226,0.06) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(94,124,226,0.06) 1px,transparent 1px);
      background-size: 40px 40px;
    }
    .molecules { position: absolute; inset: 0; }
    .mol { position: absolute; opacity: 0.09; animation: floatMol linear infinite; }
    @keyframes floatMol { 0%{transform:translateY(0) rotate(0deg)} 100%{transform:translateY(-130px) rotate(360deg)} }

    /* LAYOUT */
    .wrapper { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 0 28px 80px; }

    /* HEADER */
    header { padding: 60px 0 48px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--accent1); background: rgba(94,124,226,0.10);
      border: 1px solid rgba(94,124,226,0.20); padding: 4px 14px; border-radius: 99px; margin-bottom: 8px;
    }
    .badge svg { width:12px; height:12px; }
    h1 {
      font-family: var(--font-serif); font-size: clamp(2.8rem,5.5vw,4.2rem); font-weight: 700;
      line-height: 1.08; letter-spacing: -0.01em;
      background: linear-gradient(135deg,#2a2318 0%,var(--accent1) 52%,var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(135deg,var(--accent1),var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 0.94rem; color: var(--text-muted); font-weight: 300; max-width: 420px; line-height: 1.75; margin-top: 4px; }

    /* FILTER BAR */
    .filter-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 34px;
    }
    .note-count { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
    .note-count span { color: var(--accent1); font-weight: 600; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-pill {
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      padding: 5px 15px; border-radius: 99px;
      border: 1.5px solid rgba(94,124,226,0.22);
      background: rgba(255,255,255,0.5); color: var(--text-muted);
      cursor: pointer; transition: all 0.18s; backdrop-filter: blur(8px);
    }
    .filter-pill:hover, .filter-pill.active {
      background: linear-gradient(135deg,var(--accent1),var(--accent2));
      color: #fff; border-color: transparent;
    }

    /* GRID */
    #notes-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 22px; }

    /* CARD */
    .note-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px;
      padding: 26px 24px 22px;
      backdrop-filter: blur(18px) saturate(1.6); -webkit-backdrop-filter: blur(18px) saturate(1.6);
      box-shadow: 0 4px 24px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
      transition: transform 0.22s, box-shadow 0.22s;
      animation: cardIn 0.45s ease both;
      display: flex; flex-direction: column; gap: 12px;
      position: relative; overflow: hidden;
    }
    .note-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:20px 20px 0 0;
    }
    .note-card:nth-child(3n+1)::before { background:linear-gradient(90deg,var(--accent1),var(--accent2)); }
    .note-card:nth-child(3n+2)::before { background:linear-gradient(90deg,var(--accent2),#e85d9a); }
    .note-card:nth-child(3n+3)::before { background:linear-gradient(90deg,var(--accent3),var(--accent1)); }
    .note-card:hover { transform:translateY(-4px); box-shadow:0 14px 40px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.9); }
    @keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .note-title { font-family:var(--font-serif); font-size:1.18rem; font-weight:600; line-height:1.35; color:var(--text); flex:1; }
    .course-badge {
      display:inline-block; font-family:var(--font-mono); font-size:10px; font-weight:500;
      letter-spacing:0.06em; padding:3px 10px; border-radius:99px;
      white-space:nowrap; color:#fff; flex-shrink:0;
    }
    .card-meta { display:flex; align-items:center; gap:12px; font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono); flex-wrap:wrap; }
    .meta-item { display:flex; align-items:center; gap:4px; }
    .meta-item svg { width:12px; height:12px; opacity:0.65; }
    .card-body { font-size:13.5px; line-height:1.68; color:var(--text-muted); font-weight:300; }
    .card-footer { margin-top:auto; display:flex; gap:8px; flex-wrap:wrap; }

    .btn-pdf {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 16px; border-radius:9px; font-size:12px; font-weight:600;
      text-decoration:none; color:#fff;
      box-shadow:0 3px 12px rgba(0,0,0,0.14);
      transition:transform 0.16s, box-shadow 0.16s;
    }
    .btn-pdf:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,0.20); }
    .btn-pdf svg { width:13px; height:13px; }

    /* STATES */
    #empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:90px 20px; text-align:center; }
    .empty-icon { width:58px; height:58px; opacity:0.22; }
    #empty-state p { color:var(--text-muted); font-size:14px; max-width:300px; line-height:1.7; }

    #loading-state {
      grid-column:1/-1; display:flex; align-items:center; justify-content:center;
      gap:10px; padding:90px 20px; color:var(--text-muted); font-size:13px; font-family:var(--font-mono);
    }
    .spinner { width:18px; height:18px; border:2px solid rgba(94,124,226,0.18); border-top-color:var(--accent1); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    #error-state {
      grid-column:1/-1; background:rgba(255,255,255,0.55);
      border:1.5px solid rgba(220,80,80,0.18); border-radius:16px; padding:24px 28px;
      backdrop-filter:blur(12px); display:none; flex-direction:column; gap:6px;
    }
    #error-state h3 { font-size:14px; font-weight:600; color:#c0392b; }
    #error-state p { font-size:13px; color:var(--text-muted); line-height:1.6; }

    /* FOOTER */
    footer { text-align:center; padding:36px 0 16px; font-size:12px; color:var(--text-muted); font-family:var(--font-mono); opacity:0.6; }

    @media(max-width:600px) { h1{font-size:2.1rem;} .filter-row{flex-direction:column;align-items:flex-start;} }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>
  <div class="molecules" id="mol-container"></div>
</div>

<div class="wrapper">

  <header>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 3h6M9 3v7l-5 9h16l-5-9V3"/>
        <path d="M7 17h10" stroke-dasharray="2 2"/>
      </svg>
      Student Resources
    </div>
    <h1>Chem-<em>Mystery</em></h1>
    <p class="subtitle">Course notes, lecture PDFs, and study materials — curated for you.</p>
  </header>

  <div class="filter-row">
    <span class="note-count">Showing <span id="note-count">–</span> resources</span>
    <div class="filters" id="filter-bar">
      <button class="filter-pill active" data-filter="all">All</button>
    </div>
  </div>

  <div id="notes-grid">
    <div id="loading-state"><div class="spinner"></div>Loading resources…</div>
    <div id="empty-state" style="display:none;">
      <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="12" y="8" width="40" height="48" rx="4"/>
        <line x1="20" y1="22" x2="44" y2="22"/><line x1="20" y1="30" x2="44" y2="30"/>
        <line x1="20" y1="38" x2="34" y2="38"/>
      </svg>
      <p>No resources have been added yet. Check back soon!</p>
    </div>
    <div id="error-state">
      <h3>&#9888; Couldn't load resources</h3>
      <p id="error-msg"></p>
    </div>
  </div>

  <footer>Chem-Mystery &nbsp;&middot;&nbsp; Student Resources</footer>
</div>

<script>
  /* ── Hardcoded repo ── */
  const OWNER = 'chemmystery';
  const REPO  = 'chemmystery.github.io';
  const LABEL = 'resource';

  /* ── Course → gradient colour ── */
  const GRADIENTS = [
    'linear-gradient(135deg,#5e7ce2,#9b59b6)',
    'linear-gradient(135deg,#9b59b6,#e85d9a)',
    'linear-gradient(135deg,#2ecc9e,#5e7ce2)',
    'linear-gradient(135deg,#e85d9a,#f39c12)',
    'linear-gradient(135deg,#f39c12,#e74c3c)',
    'linear-gradient(135deg,#1abc9c,#2ecc9e)',
    'linear-gradient(135deg,#3498db,#5e7ce2)',
  ];
  const colorMap = {}; let ci = 0;
  function getColor(c) {
    if (!colorMap[c]) colorMap[c] = GRADIENTS[ci++ % GRADIENTS.length];
    return colorMap[c];
  }

  /* ── Parse issue body ── */
  // Expected format in each issue body:
  //   **Course:** Organic Chemistry II
  //   **Date:** 2025-09-15
  //   **PDF:** https://...
  //   **Notes:** Optional description
  function parseBody(body) {
    const get = k => { const m=(body||'').match(new RegExp('\\*\\*'+k+':\\*\\*\\s*(.+)','i')); return m?m[1].trim():''; };
    return { course:get('Course')||'General', date:get('Date')||'', pdf:get('PDF')||'', notes:get('Notes')||'' };
  }

  function fmtDate(s) {
    if (!s) return '';
    try { return new Date(s).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); } catch { return s; }
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── Render ── */
  function render(issues) {
    const grid = document.getElementById('notes-grid');
    grid.querySelectorAll('.note-card').forEach(el => el.remove());
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('empty-state').style.display   = 'none';
    document.getElementById('error-state').style.display   = 'none';

    if (!issues.length) {
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('note-count').textContent = '0';
      return;
    }

    /* build course filter pills */
    const courses = [...new Set(issues.map(i => parseBody(i.body).course))];
    const filterBar = document.getElementById('filter-bar');
    filterBar.querySelectorAll('[data-filter]:not([data-filter="all"])').forEach(el=>el.remove());
    courses.forEach(c => {
      const p = document.createElement('button');
      p.className='filter-pill'; p.dataset.filter=c; p.textContent=c;
      filterBar.appendChild(p);
    });

    document.getElementById('note-count').textContent = issues.length;

    issues.forEach((issue, i) => {
      const { course, date, pdf, notes } = parseBody(issue.body);
      const color = getColor(course);
      const card  = document.createElement('div');
      card.className='note-card'; card.dataset.course=course;
      card.style.animationDelay=`${i*0.06}s`;
      card.innerHTML = `
        <div class="card-top">
          <div class="note-title">${esc(issue.title)}</div>
          <div class="course-badge" style="background:${color}">${esc(course)}</div>
        </div>
        <div class="card-meta">
          ${date?`<span class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${esc(fmtDate(date))}</span>`:''}
        </div>
        ${notes?`<p class="card-body">${esc(notes)}</p>`:''}
        <div class="card-footer">
          ${pdf?`<a href="${esc(pdf)}" target="_blank" rel="noopener" class="btn-pdf" style="background:${color}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            Open PDF</a>`:'<span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);opacity:.6;">No PDF attached</span>'}
        </div>`;
      grid.appendChild(card);
    });

    setupFilters();
  }

  function setupFilters() {
    document.querySelectorAll('.filter-pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
        p.classList.add('active');
        const f = p.dataset.filter;
        const cards = document.querySelectorAll('.note-card');
        cards.forEach(c => { c.style.display=(f==='all'||c.dataset.course===f)?'':'none'; });
        document.getElementById('note-count').textContent = [...cards].filter(c=>c.style.display!=='none').length;
      });
    });
  }

  /* ── Fetch from GitHub ── */
  async function load() {
    try {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/issues?labels=${encodeURIComponent(LABEL)}&state=open&per_page=100`;
      const res = await fetch(url, { headers:{Accept:'application/vnd.github+json'} });
      if (!res.ok) throw new Error(`GitHub API responded with ${res.status}`);
      render(await res.json());
    } catch(e) {
      document.getElementById('loading-state').style.display='none';
      const el=document.getElementById('error-state');
      el.style.display='flex';
      document.getElementById('error-msg').textContent=e.message;
    }
  }

  /* ── Floating molecules ── */
  (function() {
    const svgs=[
      `<svg viewBox="0 0 60 40" fill="none" stroke="#5e7ce2" stroke-width="2"><circle cx="12" cy="20" r="8"/><circle cx="48" cy="20" r="8"/><line x1="20" y1="20" x2="40" y2="20"/></svg>`,
      `<svg viewBox="0 0 80 50" fill="none" stroke="#9b59b6" stroke-width="2"><circle cx="12" cy="25" r="8"/><circle cx="40" cy="10" r="8"/><circle cx="68" cy="25" r="8"/><line x1="20" y1="22" x2="32" y2="16"/><line x1="48" y1="16" x2="60" y2="22"/></svg>`,
      `<svg viewBox="0 0 40 70" fill="none" stroke="#2ecc9e" stroke-width="2"><circle cx="20" cy="10" r="8"/><circle cx="20" cy="40" r="8"/><circle cx="20" cy="65" r="6"/><line x1="20" y1="18" x2="20" y2="32"/><line x1="20" y1="48" x2="20" y2="59"/></svg>`,
      `<svg viewBox="0 0 60 60" fill="none" stroke="#e85d9a" stroke-width="2"><circle cx="30" cy="8" r="7"/><circle cx="52" cy="44" r="7"/><circle cx="8" cy="44" r="7"/><line x1="34" y1="15" x2="48" y2="38"/><line x1="26" y1="15" x2="12" y2="38"/><line x1="15" y1="44" x2="45" y2="44"/></svg>`,
    ];
    const c=document.getElementById('mol-container');
    for(let i=0;i<14;i++){
      const d=document.createElement('div'); d.className='mol';
      d.innerHTML=svgs[i%svgs.length];
      d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*120}%;width:${28+Math.random()*38}px;animation-duration:${18+Math.random()*22}s;animation-delay:${-Math.random()*20}s;`;
      c.appendChild(d);
    }
  })();

  load();
</script>
</body>
</html>
