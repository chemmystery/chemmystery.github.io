<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Dashboard · Chem-Mystery</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f111a;
      --surface: rgba(20, 22, 34, 0.6);
      --border: rgba(94, 124, 226, 0.3);
      --accent1: #5e7ce2;
      --accent2: #2ecc9e;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(94, 124, 226, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(46, 204, 158, 0.08), transparent 25%);
    }

    .dashboard {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    
    input, textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(94,124,226,0.15); }
    textarea { resize: vertical; min-height: 100px; }

    .token-wrap { position: relative; }
    .token-wrap input { font-family: 'DM Mono', monospace; font-size: 13px; padding-right: 100px;}
    .save-token { position: absolute; right: 6px; top: 6px; bottom: 6px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 8px; padding: 0 12px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
    .save-token:hover { background: rgba(255,255,255,0.2); }

    .file-drop {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(0,0,0,0.1);
    }
    .file-drop:hover { border-color: var(--accent2); background: rgba(46,204,158,0.05); }
    .file-drop input[type="file"] { display: none; }
    .file-list { margin-top: 12px; font-size: 13px; color: var(--accent2); font-family: 'DM Mono', monospace; }

    button.submit {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent1), #8a64eb);
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button.submit:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(94,124,226,0.3); }
    button.submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

    #status { margin-top: 20px; font-size: 14px; text-align: center; display: none; padding: 12px; border-radius: 8px; }
    .status-success { background: rgba(46,204,158,0.1); border: 1px solid rgba(46,204,158,0.3); color: #2ecc9e; }
    .status-error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .status-loading { background: rgba(94,124,226,0.1); border: 1px solid rgba(94,124,226,0.3); color: #5e7ce2; }
  </style>
</head>
<body>

<div class="dashboard">
  <h1>Upload Resource</h1>
  <p class="subtitle">Securely push notes and files directly to the database.</p>

  <div class="form-group">
    <label>GitHub Access Token (PAT)</label>
    <div class="token-wrap">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button class="save-token" onclick="saveToken()">Save</button>
    </div>
  </div>

  <div class="form-group">
    <label>Course Name</label>
    <input type="text" id="course" placeholder="e.g., Organic Chemistry II" required />
  </div>

  <div class="form-group">
    <label>Date (Optional)</label>
    <input type="date" id="date" />
  </div>

  <div class="form-group">
    <label>Notes (Optional)</label>
    <textarea id="notes" placeholder="Enter any text descriptions or summaries here..."></textarea>
  </div>

  <div class="form-group">
    <label>Attachments (PDF / Images)</label>
    <label class="file-drop">
      <span id="drop-text">Click to browse or drag & drop files here</span>
      <input type="file" id="files" multiple accept=".pdf,image/png,image/jpeg,image/webp" />
    </label>
    <div class="file-list" id="file-list"></div>
  </div>

  <button class="submit" id="submit-btn" onclick="processUpload()">Deploy Resource</button>

  <div id="status"></div>
</div>

<script>
  // Configuration
  const OWNER = 'chemmystery';
  const REPO = 'chemmystery.github.io';
  
  // UI Elements
  const tokenInput = document.getElementById('gh-token');
  const fileInput = document.getElementById('files');
  const fileList = document.getElementById('file-list');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submit-btn');

  // Load saved token on startup
  window.onload = () => {
    const saved = localStorage.getItem('gh_token');
    if (saved) tokenInput.value = saved;
  };

  function saveToken() {
    localStorage.setItem('gh_token', tokenInput.value);
    showStatus('Token saved securely to browser.', 'success');
  }

  // Handle File Selection UI
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length === 0) {
      fileList.innerHTML = '';
      return;
    }
    const names = Array.from(fileInput.files).map(f => f.name).join(', ');
    fileList.textContent = `Selected (${fileInput.files.length}): ${names}`;
  });

  function showStatus(msg, type) {
    statusEl.style.display = 'block';
    statusEl.className = `status-${type}`;
    statusEl.innerHTML = msg;
  }

  // Convert File to Base64
  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]); // Strip data URL prefix for GitHub API
    reader.onerror = error => reject(error);
  });

  async function processUpload() {
    const token = tokenInput.value.trim();
    const course = document.getElementById('course').value.trim();
    const date = document.getElementById('date').value;
    const notes = document.getElementById('notes').value.trim();
    const files = fileInput.files;

    if (!token) return showStatus('Missing GitHub Token.', 'error');
    if (!course) return showStatus('Course name is required.', 'error');

    submitBtn.disabled = true;
    showStatus('Processing and uploading files... This may take a moment.', 'loading');

    try {
      const headers = {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      };

      const uploadedUrls = [];

      // 1. Upload Files to Repository contents
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        showStatus(`Uploading ${file.name} (${i + 1}/${files.length})...`, 'loading');
        
        const base64Content = await toBase64(file);
        // Create a unique filename to prevent overriding
        const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        const path = `uploads/${Date.now()}_${safeName}`;
        
        const uploadRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify({
            message: `Upload ${file.name} via Dashboard`,
            content: base64Content
          })
        });

        if (!uploadRes.ok) throw new Error(`Failed to upload ${file.name}`);
        const uploadData = await uploadRes.json();
        
        // GitHub Pages Raw URL formatting (faster to load than api.github download_url)
        const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;
        uploadedUrls.push({ name: file.name, url: rawUrl, type: file.type });
      }

      // 2. Construct Markdown Body
      showStatus('Generating Issue database entry...', 'loading');
      
      let markdownBody = `### Course\n${course}\n\n`;
      if (date) markdownBody += `### Date\n${date}\n\n`;
      if (notes) markdownBody += `### Notes\n${notes}\n\n`;
      
      if (uploadedUrls.length > 0) {
        markdownBody += `### Attachments\n`;
        uploadedUrls.forEach(f => {
          if (f.type.startsWith('image/')) {
            markdownBody += `![${f.name}](${f.url})\n`;
          } else {
            markdownBody += `[${f.name}](${f.url})\n`;
          }
        });
      }

      // 3. Create Issue
      const issueRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          title: `[Resource] ${course}${date ? ` - ${date}` : ''}`,
          body: markdownBody,
          labels: ['resource']
        })
      });

      if (!issueRes.ok) throw new Error('Failed to create issue.');

      showStatus('Resource deployed successfully! The frontend will now reflect the changes.', 'success');
      
      // Reset form
      document.getElementById('course').value = '';
      document.getElementById('date').value = '';
      document.getElementById('notes').value = '';
      fileInput.value = '';
      fileList.textContent = '';

    } catch (error) {
      showStatus(`Error: ${error.message}`, 'error');
    } finally {
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
