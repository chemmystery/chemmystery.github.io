name: 📄 Add Resource
description: Add a new study resource to the Chem-Mystery student portal
title: "📄 Note: "
labels: ["resource"]
body:
  - type: input
    id: course
    attributes:
      label: Course
      description: The course this resource belongs to
      placeholder: e.g. Organic Chemistry II
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: Date of the lecture or material (YYYY-MM-DD)
      placeholder: e.g. 2025-09-15
    validations:
      required: true

  - type: input
    id: pdf
    attributes:
      label: PDF
      description: Direct link to the PDF file (Google Drive, Dropbox, GitHub release, etc.)
      placeholder: https://
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: A short description of what this resource covers
      placeholder: e.g. Covers SN1/SN2 mechanisms and stereochemistry
    validations:
      required: false
