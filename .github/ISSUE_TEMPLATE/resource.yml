name: Add New Resource
description: Upload a new course note, PDF, or image gallery to Chem-Mystery.
title: "[Resource] "
labels: ["resource"]
body:
  - type: input
    id: course
    attributes:
      label: Course
      description: Enter the course name (e.g., Organic Chemistry, Physical Chemistry).
      placeholder: e.g., Inorganic Chemistry II
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: The date of the lecture or note.
      placeholder: e.g., Oct 24, 2023
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add any text descriptions, summaries, or key takeaways here.
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Drag and drop your PDFs or images here to upload them securely to GitHub.
    validations:
      required: false
