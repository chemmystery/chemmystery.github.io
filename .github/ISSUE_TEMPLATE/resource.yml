name: 📄 Add Resource
description: Add a new study resource to the Chem-Mystery student portal
title: "📄 Note: "
labels: ["resource"]
body:
  - type: input
    id: course
    attributes:
      label: Course
      description: The course this resource belongs to
      placeholder: e.g. Organic Chemistry II
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: Date of the lecture or material (YYYY-MM-DD)
      placeholder: e.g. 2025-09-15
    validations:
      required: true

  - type: textarea
    id: pdf
    attributes:
      label: PDF File
      description: >
        Attach your PDF here — drag & drop the file into this box or click the
        paperclip icon below the text area. GitHub will upload it and insert a
        link automatically. Do not type anything; just attach the file.
      placeholder: "Attach PDF by dragging it here or clicking the paperclip ↓"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: A short description of what this resource covers
      placeholder: e.g. Covers SN1/SN2 mechanisms and stereochemistry
    validations:
      required: false
